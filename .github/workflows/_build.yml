name: _build

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string

jobs:
  build:
    name: "PHP ${{ matrix.php_version }} / Node ${{ matrix.node_version }} (${{ matrix.runner }})"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set platform info
        id: platform
        run: |
          if [[ "${{ matrix.runner }}" == "ubuntu-latest" ]]; then
            echo "arch=amd64" >> "$GITHUB_OUTPUT"
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          else
            echo "arch=arm64" >> "$GITHUB_OUTPUT"
            echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (arch-specific)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.prod_path }}
          file: ${{ matrix.prod_path }}/Dockerfile
          platforms: ${{ steps.platform.outputs.platform }}
          push: true
          tags: ghcr.io/${{ matrix.image_name }}:php${{ matrix.php_version }}-node${{ matrix.node_version }}-${{ steps.platform.outputs.arch }}
          build-args: |
            NODE_VERSION=${{ matrix.node_version }}
          no-cache: true
          provenance: true
          sbom: true
