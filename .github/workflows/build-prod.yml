name: Build Prod Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "prod/**"
  workflow_dispatch:

jobs:
  detect:
    name: Detect changed PHP versions
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.filter.outputs.build_matrix }}
      merge_matrix: ${{ steps.filter.outputs.merge_matrix }}
      image_name: ${{ steps.filter.outputs.image_name }}
      has_builds: ${{ steps.filter.outputs.has_builds }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine versions to build
        id: filter
        run: |
          # ── Auto-discover PHP versions from folder structure ──────────────
          ALL_VERSIONS='[]'
          for config_file in prod/laravel/php*/config.json; do
            dir=$(dirname "$config_file" | xargs basename)
            php_version=$(echo "$dir" | sed 's/php\([0-9]\)\([0-9]*\)/\1.\2/')
            config=$(cat "$config_file")
            ver=$(echo "$config" | jq -r '.version')
            default_node=$(echo "$config" | jq '.default_node')
            is_latest=$(echo "$config" | jq '.is_latest')
            node_versions=$(echo "$config" | jq '.node_versions')
            entry=$(jq -n \
              --arg php_version "$php_version" \
              --arg php_dir "$dir" \
              --arg ver "$ver" \
              --argjson default_node "$default_node" \
              --argjson is_latest "$is_latest" \
              --argjson node_versions "$node_versions" \
              '{php_version: $php_version, php_dir: $php_dir, image_version: $ver, default_node: $default_node, is_latest: $is_latest, node_versions: $node_versions}')
            ALL_VERSIONS=$(echo "$ALL_VERSIONS" | jq --argjson e "$entry" '. += [$e]')
          done
          # ─────────────────────────────────────────────────────────────────

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSIONS="$ALL_VERSIONS"
          else
            VERSIONS="[]"
            for row in $(echo "$ALL_VERSIONS" | jq -c '.[]'); do
              dir=$(echo "$row" | jq -r '.php_dir')
              NEW_VER=$(jq -r '.version' "prod/laravel/${dir}/config.json")
              OLD_VER=$(git show HEAD~1:"prod/laravel/${dir}/config.json" 2>/dev/null | jq -r '.version // ""')
              if [[ "$NEW_VER" != "$OLD_VER" ]]; then
                VERSIONS=$(echo "$VERSIONS" | jq ". += [$row]")
              fi
            done
          fi

          BUILD_MATRIX=$(echo "$VERSIONS" | jq -c '{
            include: [
              .[] | . as $e |
              $e.node_versions[] | . as $node |
              (["ubuntu-latest", "ubuntu-24-arm"][] | {
                php_version: $e.php_version,
                php_dir: $e.php_dir,
                node_version: $node,
                default_node: $e.default_node,
                is_latest: $e.is_latest,
                image_version: $e.image_version,
                runner: .
              })
            ]
          }')

          MERGE_MATRIX=$(echo "$VERSIONS" | jq -c '{
            include: [
              .[] | . as $e |
              $e.node_versions[] | {
                php_version: $e.php_version,
                php_dir: $e.php_dir,
                node_version: .,
                default_node: $e.default_node,
                is_latest: $e.is_latest,
                image_version: $e.image_version
              }
            ]
          }')

          HAS_BUILDS=$(echo "$BUILD_MATRIX" | jq 'if (.include | length) > 0 then "true" else "false" end' -r)

          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "merge_matrix=${MERGE_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "image_name=${{ github.repository_owner }}/laravel-php" >> "$GITHUB_OUTPUT"
          echo "has_builds=${HAS_BUILDS}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.has_builds == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      matrix: ${{ needs.detect.outputs.build_matrix }}
      image_name: ${{ needs.detect.outputs.image_name }}
    secrets: inherit

  merge:
    needs: [detect, build]
    if: needs.detect.outputs.has_builds == 'true'
    uses: ./.github/workflows/_merge.yml
    with:
      matrix: ${{ needs.detect.outputs.merge_matrix }}
      image_name: ${{ needs.detect.outputs.image_name }}
    secrets: inherit
