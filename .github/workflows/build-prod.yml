name: Build Prod Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "prod/**"
  workflow_dispatch:

jobs:
  detect:
    name: Detect changed PHP versions
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.filter.outputs.build_matrix }}
      merge_matrix: ${{ steps.filter.outputs.merge_matrix }}
      image_name: ${{ steps.filter.outputs.image_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine versions to build
        id: filter
        run: |
          # ── Single source of truth ───────────────────────────────────────
          NODE_VERSIONS='[20, 22, 24]'
          ALL_VERSIONS='[
            {"php_version":"8.4","php_dir":"php84","default_node":22,"is_latest":false},
            {"php_version":"8.5","php_dir":"php85","default_node":24,"is_latest":true}
          ]'
          # ─────────────────────────────────────────────────────────────────

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSIONS="$ALL_VERSIONS"
          else
            VERSIONS="[]"
            for row in $(echo "$ALL_VERSIONS" | jq -c '.[]'); do
              dir=$(echo "$row" | jq -r '.php_dir')
              if git diff --name-only HEAD~1 HEAD | grep -q "^prod/laravel/${dir}/"; then
                VERSIONS=$(echo "$VERSIONS" | jq ". += [$row]")
              fi
            done
          fi

          BUILD_MATRIX=$(echo "$VERSIONS" | jq -c --argjson nodes "$NODE_VERSIONS" '{
            php_version: [.[].php_version],
            node_version: $nodes,
            runner: ["ubuntu-latest", "ubuntu-24-arm"],
            include: map({php_version, php_dir, default_node, is_latest})
          }')

          MERGE_MATRIX=$(echo "$VERSIONS" | jq -c --argjson nodes "$NODE_VERSIONS" '{
            php_version: [.[].php_version],
            node_version: $nodes,
            include: map({php_version, php_dir, default_node, is_latest})
          }')

          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "merge_matrix=${MERGE_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "image_name=${{ github.repository_owner }}/laravel-php" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    uses: ./.github/workflows/_build.yml
    with:
      matrix: ${{ needs.detect.outputs.build_matrix }}
      image_name: ${{ needs.detect.outputs.image_name }}
    secrets: inherit

  merge:
    needs: [detect, build]
    uses: ./.github/workflows/_merge.yml
    with:
      matrix: ${{ needs.detect.outputs.merge_matrix }}
      image_name: ${{ needs.detect.outputs.image_name }}
    secrets: inherit
